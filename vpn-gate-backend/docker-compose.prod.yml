services:
  backend:
    image: ghcr.io/ras1putra/vpn-gate-backend:latest
    ports:
      - "8081:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
